<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiverr Clone - Freelance Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Fiverr <span>Clone</span></h2>
            </div>
            <div class="nav-search">
                <input type="text" placeholder="Search gigs..." id="searchInput">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-menu">
                <a href="#" id="exploreBtn">Explore</a>
                <a href="#" id="becomeSellerBtn">Become a Seller</a>
                <div class="user-menu" id="userMenu">
                    <img src="https://via.placeholder.com/40" alt="Profile" id="profileImg" onclick="toggleUserMenu()">
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="#" id="loginBtn">Login</a>
                        <a href="#" id="signupBtn">Sign Up</a>
                        <a href="#" id="dashboardBtn" style="display:none;">Dashboard</a>
                        <a href="#" id="logoutBtn" style="display:none;">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Join the largest freelance marketplace</h1>
            <p>Find the best freelance services or be a freelancer</p>
            <div class="hero-buttons">
                <button class="btn-primary" id="buyerBtn">Hire talent</button>
                <button class="btn-secondary" id="sellerBtn">Start selling</button>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories">
        <div class="container">
            <h2>Popular Categories</h2>
            <div class="category-grid" id="categoryGrid">
                <!-- Categories will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Featured Gigs -->
    <section class="gigs">
        <div class="container">
            <div class="section-header">
                <h2>Featured Gigs</h2>
                <select id="sortFilter">
                    <option value="newest">Newest first</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>
            <div class="gigs-grid" id="gigsGrid">
                <!-- Gigs will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Modal for Gig Details -->
    <div class="modal" id="gigModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="gigDetails"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content auth-modal">
            <span class="close" id="closeAuth">&times;</span>
            <div id="authContent">
                <!-- Auth form will be populated by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
